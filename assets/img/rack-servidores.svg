<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Rack de servidores com unidades ativas e indicadores de status">
  <defs>
    <linearGradient id="rk-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#170d27"/><stop offset="1" stop-color="#0c0614"/>
    </linearGradient>
    <radialGradient id="rk-halo" cx=".74" cy=".14" r=".62">
      <stop offset="0" stop-color="#4FD8E0" stop-opacity=".22"/>
      <stop offset="1" stop-color="#4FD8E0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rk-body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2d1d45"/><stop offset=".55" stop-color="#20153a"/><stop offset="1" stop-color="#170e2b"/>
    </linearGradient>
    <linearGradient id="rk-floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4FD8E0" stop-opacity=".16"/>
      <stop offset="1" stop-color="#4FD8E0" stop-opacity="0"/>
    </linearGradient>
    <pattern id="rk-vent" width="7" height="7" patternUnits="userSpaceOnUse">
      <path d="M3.5 0 V7" stroke="#F6F3FA" stroke-opacity=".08" stroke-width="1"/>
    </pattern>
    <style>
      .led { fill: #4FD8E0; }
      .led--idle { fill: #F6F3FA; fill-opacity: .22; }
      .bar { fill: #4FD8E0; }
      @media (prefers-reduced-motion: no-preference) {
        .led { animation: blink 2.6s ease-in-out infinite; }
        .u:nth-of-type(2n) .led { animation-delay: .5s; }
        .u:nth-of-type(3n) .led { animation-delay: 1.1s; }
        .u:nth-of-type(4n) .led { animation-delay: 1.7s; }
        .bar { animation: sweep 4.2s ease-in-out infinite; }
        .cable { stroke-dasharray: 6 10; animation: flow 3.4s linear infinite; }
      }
      @keyframes blink { 0%,100% { opacity: .35 } 50% { opacity: 1 } }
      @keyframes sweep { 0%,100% { transform: translateX(0) } 50% { transform: translateX(300px) } }
      @keyframes flow { to { stroke-dashoffset: -32 } }
    </style>
  </defs>

  <rect width="800" height="600" fill="url(#rk-bg)"/>
  <rect width="800" height="600" fill="url(#rk-halo)"/>

  <!-- reflexo no piso -->
  <ellipse cx="400" cy="548" rx="230" ry="26" fill="url(#rk-floor)"/>

  <!-- corpo do rack -->
  <rect x="208" y="60" width="384" height="482" rx="18" fill="url(#rk-body)" stroke="#F6F3FA" stroke-opacity=".12"/>
  <rect x="220" y="72" width="360" height="16" rx="5" fill="#120a1c" stroke="#F6F3FA" stroke-opacity=".07"/>
  <rect class="bar" x="226" y="76" width="48" height="8" rx="4" opacity=".9"/>

  <g stroke="#F6F3FA" stroke-opacity=".08">
    <g class="u"><rect x="220" y="100" width="360" height="40" rx="7" fill="#1d1333"/><rect x="234" y="110" width="30" height="20" rx="3" fill="#281a44"/><rect x="270" y="110" width="30" height="20" rx="3" fill="#281a44"/><rect x="306" y="110" width="30" height="20" rx="3" fill="#281a44"/><rect x="352" y="108" width="176" height="24" rx="4" fill="url(#rk-vent)" stroke="none"/><circle class="led" cx="548" cy="120" r="3.4" stroke="none"/><circle class="led--idle" cx="562" cy="120" r="3.4" stroke="none"/></g>
    <g class="u"><rect x="220" y="146" width="360" height="40" rx="7" fill="#1d1333"/><rect x="234" y="156" width="30" height="20" rx="3" fill="#281a44"/><rect x="270" y="156" width="30" height="20" rx="3" fill="#281a44"/><rect x="306" y="156" width="30" height="20" rx="3" fill="#281a44"/><rect x="352" y="154" width="176" height="24" rx="4" fill="url(#rk-vent)" stroke="none"/><circle class="led" cx="548" cy="166" r="3.4" stroke="none"/><circle class="led--idle" cx="562" cy="166" r="3.4" stroke="none"/></g>
    <g class="u"><rect x="220" y="192" width="360" height="40" rx="7" fill="#1d1333"/><rect x="234" y="202" width="30" height="20" rx="3" fill="#281a44"/><rect x="270" y="202" width="30" height="20" rx="3" fill="#281a44"/><rect x="306" y="202" width="30" height="20" rx="3" fill="#281a44"/><rect x="352" y="200" width="176" height="24" rx="4" fill="url(#rk-vent)" stroke="none"/><circle class="led" cx="548" cy="212" r="3.4" stroke="none"/><circle class="led--idle" cx="562" cy="212" r="3.4" stroke="none"/></g>
    <g class="u"><rect x="220" y="238" width="360" height="40" rx="7" fill="#1d1333"/><rect x="234" y="248" width="30" height="20" rx="3" fill="#281a44"/><rect x="270" y="248" width="30" height="20" rx="3" fill="#281a44"/><rect x="306" y="248" width="30" height="20" rx="3" fill="#281a44"/><rect x="352" y="246" width="176" height="24" rx="4" fill="url(#rk-vent)" stroke="none"/><circle class="led" cx="548" cy="258" r="3.4" stroke="none"/><circle class="led--idle" cx="562" cy="258" r="3.4" stroke="none"/></g>
    <g class="u"><rect x="220" y="284" width="360" height="40" rx="7" fill="#1d1333"/><rect x="234" y="294" width="30" height="20" rx="3" fill="#281a44"/><rect x="270" y="294" width="30" height="20" rx="3" fill="#281a44"/><rect x="306" y="294" width="30" height="20" rx="3" fill="#281a44"/><rect x="352" y="292" width="176" height="24" rx="4" fill="url(#rk-vent)" stroke="none"/><circle class="led" cx="548" cy="304" r="3.4" stroke="none"/><circle class="led--idle" cx="562" cy="304" r="3.4" stroke="none"/></g>
    <g class="u"><rect x="220" y="330" width="360" height="40" rx="7" fill="#1d1333"/><rect x="234" y="340" width="30" height="20" rx="3" fill="#281a44"/><rect x="270" y="340" width="30" height="20" rx="3" fill="#281a44"/><rect x="306" y="340" width="30" height="20" rx="3" fill="#281a44"/><rect x="352" y="338" width="176" height="24" rx="4" fill="url(#rk-vent)" stroke="none"/><circle class="led" cx="548" cy="350" r="3.4" stroke="none"/><circle class="led--idle" cx="562" cy="350" r="3.4" stroke="none"/></g>
    <g class="u"><rect x="220" y="376" width="360" height="40" rx="7" fill="#1d1333"/><rect x="234" y="386" width="30" height="20" rx="3" fill="#281a44"/><rect x="270" y="386" width="30" height="20" rx="3" fill="#281a44"/><rect x="306" y="386" width="30" height="20" rx="3" fill="#281a44"/><rect x="352" y="384" width="176" height="24" rx="4" fill="url(#rk-vent)" stroke="none"/><circle class="led" cx="548" cy="396" r="3.4" stroke="none"/><circle class="led--idle" cx="562" cy="396" r="3.4" stroke="none"/></g>
    <g class="u"><rect x="220" y="422" width="360" height="40" rx="7" fill="#1d1333"/><rect x="234" y="432" width="30" height="20" rx="3" fill="#281a44"/><rect x="270" y="432" width="30" height="20" rx="3" fill="#281a44"/><rect x="306" y="432" width="30" height="20" rx="3" fill="#281a44"/><rect x="352" y="430" width="176" height="24" rx="4" fill="url(#rk-vent)" stroke="none"/><circle class="led" cx="548" cy="442" r="3.4" stroke="none"/><circle class="led--idle" cx="562" cy="442" r="3.4" stroke="none"/></g>
    <!-- patch panel -->
    <g class="u"><rect x="220" y="468" width="360" height="40" rx="7" fill="#191029"/>
      <g fill="#0f0a1a" stroke="#4FD8E0" stroke-opacity=".28">
        <rect x="236" y="480" width="18" height="16" rx="2"/><rect x="260" y="480" width="18" height="16" rx="2"/>
        <rect x="284" y="480" width="18" height="16" rx="2"/><rect x="308" y="480" width="18" height="16" rx="2"/>
        <rect x="332" y="480" width="18" height="16" rx="2"/><rect x="356" y="480" width="18" height="16" rx="2"/>
        <rect x="380" y="480" width="18" height="16" rx="2"/><rect x="404" y="480" width="18" height="16" rx="2"/>
        <rect x="428" y="480" width="18" height="16" rx="2"/><rect x="452" y="480" width="18" height="16" rx="2"/>
      </g>
    </g>
  </g>

  <!-- cabeamento organizado saindo do patch panel -->
  <g fill="none" stroke="#4FD8E0" stroke-opacity=".45" stroke-width="2" stroke-linecap="round">
    <path class="cable" d="M580 488 C650 488 660 430 720 430"/>
    <path class="cable" d="M580 494 C660 494 672 470 730 470" stroke-opacity=".3"/>
    <path class="cable" d="M580 482 C640 482 652 380 710 380" stroke-opacity=".22"/>
  </g>
  <g fill="#4FD8E0">
    <circle cx="720" cy="430" r="3.2"/><circle cx="730" cy="470" r="3.2" fill-opacity=".6"/><circle cx="710" cy="380" r="3.2" fill-opacity=".45"/>
  </g>
</svg>
